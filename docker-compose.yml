# Kafka vs Sidekiq Benchmark — Docker Compose
#
# Infrastructure services start by default.
# Workers and orchestrator are gated behind profiles so they can be brought
# up / down independently by the run scripts.
#
# Environment variables (with defaults):
#   KAFKA_PARTITIONS        6
#   SIDEKIQ_CONCURRENCY     10
#   KAFKA_CONSUMERS         1       (replica count)
#   SIDEKIQ_WORKERS         1       (replica count)
#   BENCH_MODE              baseline
#   WORKER_THREADS          1       (Kafka consumer thread pool)
#   SIDEKIQ_BATCH_SIZE      1       (orchestrator enqueue batching)
#   STUB_WORKERS            4       (gunicorn worker count)
#   REDIS_IO_THREADS        1       (Redis I/O threads)

services:
  # Infrastructure 

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Zookeeper || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: ${KAFKA_PARTITIONS:-6}
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_MS: 3600000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_IO_THREADS: ${KAFKA_NUM_IO_THREADS:-8}
      KAFKA_NUM_NETWORK_THREADS: ${KAFKA_NUM_NETWORK_THREADS:-3}
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly ${REDIS_AOF:-no} --save "" --io-threads ${REDIS_IO_THREADS:-1}
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 5s
      timeout: 3s
      retries: 5

  stub-server:
    build: ./stub_server
    environment:
      STUB_WORKERS: ${STUB_WORKERS:-4}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Kafka consumer (profile: kafka)

  kafka-consumer:
    build: ./kafka_bench
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      stub-server:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/15
      STUB_SERVER_URL: http://stub-server:8080
      CONSUMER_GROUP: ${CONSUMER_GROUP:-bench-group}
      TOPIC: ${KAFKA_TOPIC:-benchmark}
      WORKER_THREADS: ${WORKER_THREADS:-1}
      MAX_PENDING: ${MAX_PENDING:-2}
      FETCH_MIN_BYTES: ${FETCH_MIN_BYTES:-1}
      FETCH_MAX_WAIT_MS: ${FETCH_MAX_WAIT_MS:-500}
      AUTO_COMMIT_INTERVAL_MS: ${AUTO_COMMIT_INTERVAL_MS:-1000}
    deploy:
      replicas: ${KAFKA_CONSUMERS:-1}
    profiles:
      - kafka

  # Sidekiq worker (profile: sidekiq) 

  sidekiq-worker:
    build: ./sidekiq_bench
    depends_on:
      redis:
        condition: service_healthy
      stub-server:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      METRICS_REDIS_URL: redis://redis:6379/15
      STUB_SERVER_URL: http://stub-server:8080
      SIDEKIQ_CONCURRENCY: ${SIDEKIQ_CONCURRENCY:-10}
      METRICS_POOL_SIZE: ${METRICS_POOL_SIZE:-5}
      HTTP_POOL_SIZE: ${HTTP_POOL_SIZE:-10}
    deploy:
      replicas: ${SIDEKIQ_WORKERS:-1}
    profiles:
      - sidekiq

  # Orchestrator (profile: orchestrator) 

  orchestrator:
    build: ./orchestrator
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_REDIS_URL: redis://redis:6379/15
      RESULTS_DIR: /app/results
      BENCH_MODE: ${BENCH_MODE:-baseline}
      SIDEKIQ_BATCH_SIZE: ${SIDEKIQ_BATCH_SIZE:-1}
      KAFKA_COMPRESSION: ${KAFKA_COMPRESSION:-none}
      KAFKA_ACKS: ${KAFKA_ACKS:-all}
      WORKER_THREADS: ${WORKER_THREADS:-1}
    volumes:
      - ./results:/app/results
    profiles:
      - orchestrator
