services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  redis:
    image: redis:7.2.4-alpine
    command: ["redis-server", "--appendonly", "no", "--io-threads", "${REDIS_IO_THREADS:-1}"]

  metrics-redis:
    image: redis:7.2.4-alpine
    command: ["redis-server", "--appendonly", "no"]

  stub-server:
    build:
      context: .
      dockerfile: stub_server/Dockerfile
    environment:
      STUB_SERVER_WORKERS: ${STUB_SERVER_WORKERS:-20}
    volumes:
      - .:/app

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - redis
      - metrics-redis
      - stub-server
    working_dir: /app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_REDIS_URL: redis://metrics-redis:6379/0
      STUB_SERVER_URL: http://stub-server:8080
    volumes:
      - .:/app

  kafka-consumer:
    build:
      context: .
      dockerfile: kafka_worker/Dockerfile
    depends_on:
      - kafka
      - metrics-redis
      - stub-server
    working_dir: /app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_REDIS_URL: redis://metrics-redis:6379/0
      STUB_SERVER_URL: http://stub-server:8080
      KAFKA_TOPIC: ${KAFKA_TOPIC:-benchmark}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-benchmark-group}
      KAFKA_THREADS: ${KAFKA_THREADS:-1}
      FETCH_MIN_BYTES: ${FETCH_MIN_BYTES:-1}
      FETCH_MAX_WAIT_MS: ${FETCH_MAX_WAIT_MS:-500}
    volumes:
      - .:/app

  sidekiq-worker:
    build:
      context: .
      dockerfile: sidekiq_worker/Dockerfile
    depends_on:
      - redis
      - metrics-redis
      - stub-server
    working_dir: /app/sidekiq_worker
    environment:
      REDIS_URL: redis://redis:6379/0
      METRICS_REDIS_URL: redis://metrics-redis:6379/0
      STUB_SERVER_URL: http://stub-server:8080
      BENCHMARK_QUEUE: ${BENCHMARK_QUEUE:-benchmark}
      SIDEKIQ_THREADS: ${SIDEKIQ_THREADS:-1}
    command:
      [
        "sh",
        "-lc",
        "exec bundle exec sidekiq -r ./worker.rb -q \"${BENCHMARK_QUEUE:-benchmark}\" -c \"${SIDEKIQ_THREADS:-1}\"",
      ]
    volumes:
      - .:/app
